[env:esp32cam]
platform = espressif32
board = esp32cam
framework = espidf
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
build_flags =
    -D WIFI_SSID=\"MurderPony\"
    -D WIFI_PASSWORD=\"!Jack0187City\"
    -D MQTT_URI=\"mqtt://192.168.40.101:1883\"
    -D MQTT_USERNAME=\"\"
    -D MQTT_PASSWORD=\"\"
    -D NODE_GROUP=\"all\"
    -D TELEMETRY_PERIOD_MS=5000
    -D INVENTORY_PERIOD_MS=60000

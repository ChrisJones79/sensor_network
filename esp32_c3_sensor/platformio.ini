; PlatformIO Project Configuration File
;
; ESP32-C3 BME680 BLE Sensor Node
; Reads temperature, humidity, pressure, and gas resistance from a BME680
; via I2C and broadcasts the readings as a BLE non-connectable advertisement.
; The nearest ESP32-CAM (BLE central) scans and forwards data via MQTT.
;
; https://docs.platformio.org/page/projectconf.html

[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = espidf
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
board_build.sdkconfig_defaults = sdkconfig.defaults
build_flags =
    ; --- BME680 I2C wiring ---
    ; Default pins for ESP32-C3 DevKitM-1.  Adjust if your board differs.
    -D BME680_I2C_ADDR=0x77         ; 0x76 if SDO pulled low
    -D BME680_SDA_PIN=6
    -D BME680_SCL_PIN=7

    ; --- Sampling ---
    -D SAMPLE_PERIOD_MS=10000       ; measurement interval in ms

    ; --- Gas heater ---
    -D HEATER_TEMP=300              ; target temperature in °C (max 400)
    -D HEATER_DURATION_MS=150       ; heater wait time in ms

    ; --- Ambient temperature estimate used for heater resistance calc ---
    -D AMB_TEMP=25

    ; --- BLE advertising interval (units of 0.625 ms) ---
    -D BLE_ADV_INT_MIN=0x40         ; 40 ms
    -D BLE_ADV_INT_MAX=0x80         ; 80 ms

    ; --- Post-power-on warm-up window (seconds) ---
    ; firmware asserts warming_up=true in the advertisement for this duration
    ; after each boot; backend uses it to track warm-up events once burn-in
    ; is complete, and to detect reboot-caused burn-in interruptions.
    -D WARM_UP_DURATION_S=1800      ; 30 minutes

    ; --- Node identity ---
    -D NODE_GROUP=\"all\"
    -D SENSOR_SID=\"bme680_0\"
    -D SENSOR_STYPE=\"bme680\"
